<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hair Salon Booking</title>

    <!--Link to CSS file (styling)-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>BOOK AN APPOINTMENT</h1>

    <!--User instructions for filling out form-->
    <p id="description">Please fill out the following form to complete a reservation.</p>

    <!--Reservation form-->
    <form id="reservation">

        <!--Service selection-->
        <div class="form">
            <label for="service">SERVICE:</label>
            <select id="service" required>
                <option value="" selected disabled>- Select a service -</option> 
                <option value="Haircut">Haircut</option>
                <option value="Coloring">Coloring</option>
                <option value="Blow-Dry">Blow-Dry</option>
            </select>
        </div>

        <!--Specialist selection-->
        <div class="form">
            <label for="specialist">SPECIALIST:</label>
            <select id="specialist" required>
                <option value="" selected disabled>- Select a specialist -</option> 
                <option value="Christina">Christina</option>
                <option value="Alex">Alex</option>
            </select>
        </div>

        <!--Date selection in calendar-->
        <div class="form">
            <label for="date">DATE:</label>
            <input type="date" id="date" required>
        </div>

        <!--Time selection-->
        <div class="form">
            <label for="time">TIME:</label>
            <select id="time" required>
                <option value="" selected disabled>- Select time -</option> 
                <option value="10AM">10AM</option>
                <option value="11AM">11AM</option>
                <option value="12PM">12PM</option>
                <option value="1PM">1PM</option>
                <option value="2PM">2PM</option>
                <option value="3PM">3PM</option>
                <option value="4PM">4PM</option>
                <option value="5PM">5PM</option>
            </select>
        </div>

        <!--Input of client name-->
        <div class="form">
            <label for="name">CLIENT NAME:</label>
            <input type="text" id="name" placeholder="Enter name" required>
        </div>

        <!--Reservation submission button-->
        <div class="form">
            <button class="bookButton" type="submit">BOOK</button>
        </div>
    </form>

    <!--Confirmation message displayed after successful submission-->
    <p id="confirmation"></p>

    <!--Link to JavaScript file (frontend)-->
    <script src="script.js"></script>
</body>

</html>
