<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>All Reservations</title>

    <!--Link to CSS file (styling)-->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h2>ALL RESERVATIONS</h2>

    <!--Table displaying reservations-->
    <div class="tableBox">
        <table id="reservationTable">
            <thead>
                <tr>
                    <th>SERVICE</th>
                    <th>SPECIALIST</th>
                    <th>DATE</th>
                    <th>TIME</th>
                    <th>NAME</th>
                    <th>DELETION</th>
                </tr>
            </thead>

            <!--Actual reservation data in table rows-->
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <!--Confirmation message displayed after successful deletion-->
    <p id="deletionConfirmation"></p>

    <!--Link to JavaScript file-->
    <script src="salon.js"></script>
</body>

</html>
